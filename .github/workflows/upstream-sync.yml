name: Upstream CellProtocol sync

on:
  repository_dispatch:
    types:
      - cellprotocol-upstream
      - cellscaffold-upstream
  workflow_dispatch:
    inputs:
      cellprotocol_ref:
        description: CellProtocol ref to test
        required: false
        default: main
      cellscaffold_ref:
        description: CellScaffold ref to test
        required: false
        default: main
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: upstream-cellprotocol-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Test against upstream heads
    runs-on: macos-latest
    env:
      CELLPROTOCOL_SYNC_TOKEN: ${{ secrets.CELLPROTOCOL_SYNC_TOKEN }}
      CELLPROTOCOL_REF: ${{ github.event.client_payload.repository == 'Digipomps/CellProtocol' && github.event.client_payload.sha || github.event.inputs.cellprotocol_ref || 'main' }}
      CELLSCAFFOLD_REF: ${{ github.event.client_payload.repository == 'Digipomps/CellScaffold' && github.event.client_payload.sha || github.event.inputs.cellscaffold_ref || 'main' }}

    steps:
      - name: Check out PyCellProtocol
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out CellProtocol
        uses: actions/checkout@v4
        with:
          repository: Digipomps/CellProtocol
          ref: ${{ env.CELLPROTOCOL_REF }}
          path: upstream/CellProtocol
          token: ${{ secrets.CELLPROTOCOL_SYNC_TOKEN || github.token }}

      - name: Check out CellScaffold
        if: ${{ env.CELLPROTOCOL_SYNC_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: Digipomps/CellScaffold
          ref: ${{ env.CELLSCAFFOLD_REF }}
          path: upstream/CellScaffold
          token: ${{ secrets.CELLPROTOCOL_SYNC_TOKEN }}

      - name: Explain skipped CellScaffold checkout
        if: ${{ env.CELLPROTOCOL_SYNC_TOKEN == '' }}
        run: echo "CELLPROTOCOL_SYNC_TOKEN is not configured; private CellScaffold checkout is skipped."

      - name: Configure private Digipomps dependency access
        if: ${{ env.CELLPROTOCOL_SYNC_TOKEN != '' }}
        run: >
          git config --global
          url."https://x-access-token:${CELLPROTOCOL_SYNC_TOKEN}@github.com/Digipomps/".insteadOf
          "https://github.com/Digipomps/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyCellProtocol
        run: python -m pip install -e ".[scaffold,dev]"

      - name: Run Python parity tests
        run: python -m pytest

      - name: Run Swift bridge parity smoke
        if: ${{ env.CELLPROTOCOL_SYNC_TOKEN != '' }}
        env:
          PY_CELL_SWIFT_CELLPROTOCOL_DIR: ${{ github.workspace }}/upstream/CellProtocol
        run: python scripts/swift_parity_smoke.py

      - name: Explain skipped Swift bridge parity smoke
        if: ${{ env.CELLPROTOCOL_SYNC_TOKEN == '' }}
        run: echo "CELLPROTOCOL_SYNC_TOKEN is not configured; SwiftPM private Digipomps dependencies are not available."

      - name: Update upstream lock
        run: >
          python scripts/update_upstream_lock.py
          --cellprotocol upstream/CellProtocol
          --cellscaffold upstream/CellScaffold
          --output upstream-lock.json

      - name: Commit upstream lock when it changed
        run: |
          if [ -z "$(git status --porcelain -- upstream-lock.json)" ]; then
            echo "upstream-lock.json is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream-lock.json
          git commit -m "Track upstream CellProtocol heads"
          git push
